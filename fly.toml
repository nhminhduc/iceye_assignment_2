app = 'larvis-app'
primary_region = 'sin'

[build]
  [build.args]
    VITE_API_URL = 'https://larvis-api.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
